<div class="d-flex flex-column min-vh-100">
  <!-- Navigation Header -->
  <nav class="navbar navbar-expand-lg border-bottom sticky-top shadow-sm" style="background-color: var(--bs-body-bg);">
    <div class="container">
      <!-- Brand Logo & Name -->
      <a class="navbar-brand d-flex align-items-center fw-bold fs-4 text-gradient" routerLink="/home">
        <i class="bi bi-mortarboard-fill me-2 text-primary fs-3"></i>
        <span>AngularUniversity</span>
      </a>

      <!-- Navbar Toggler for Mobile -->
      <button 
        class="navbar-toggler border-0 shadow-none" 
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#navbarNav" 
        aria-controls="navbarNav" 
        aria-expanded="false" 
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navigation links -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center gap-2 mt-3 mt-lg-0">
          <li class="nav-item">
            <a class="nav-link px-3 rounded-pill fw-semibold" routerLink="/home" routerLinkActive="active">
              <i class="bi bi-house-door-fill me-1"></i>Início
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 rounded-pill fw-semibold d-flex align-items-center" routerLink="/favorites" routerLinkActive="active">
              <i class="bi bi-heart-fill me-1 text-danger"></i>Favoritas
              <span *ngIf="favoritesCount > 0" class="badge rounded-pill bg-danger ms-1.5 animate-pulse">
                {{ favoritesCount }}
              </span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 rounded-pill fw-semibold" routerLink="/about" routerLinkActive="active">
              <i class="bi bi-info-circle-fill me-1"></i>Sobre
            </a>
          </li>
          
          <!-- Divider for desktop / margin for mobile -->
          <li class="nav-item d-none d-lg-block border-end mx-2" style="height: 1.5rem;"></li>
          
          <!-- Theme Switcher -->
          <li class="nav-item mt-2 mt-lg-0">
            <button 
              (click)="toggleTheme()" 
              type="button" 
              class="btn btn-theme-toggle rounded-circle border-0 d-flex align-items-center justify-content-center hover-scale"
              style="width: 40px; height: 40px; background-color: var(--bs-tertiary-bg);"
              [title]="isDarkMode ? 'Mudar para Modo Claro' : 'Mudar para Modo Escuro'"
            >
              <i class="bi" [ngClass]="isDarkMode ? 'bi-sun-fill text-warning' : 'bi-moon-stars-fill text-primary'"></i>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Router Outlet Container -->
  <main class="flex-grow-1" style="background-color: var(--bs-tertiary-bg);">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="border-top py-4 mt-auto" style="background-color: var(--bs-body-bg);">
    <div class="container">
      <div class="row align-items-center justify-content-between g-3">
        <div class="col-md-6 text-center text-md-start">
          <span class="text-muted small">&copy; 2026 <strong>AngularUniversity</strong> – Catálogo Mundial de Universidades.</span>
        </div>
        <div class="col-md-6 text-center text-md-end">
          <span class="text-muted small">
            Desenvolvido com Angular &hearts; como trabalho acadêmico.
          </span>
        </div>
      </div>
    </div>
  </footer>
</div>
